        <script type="text/template" id="ai-source">## 1. 本周表现审计
- 本周收益+0.17%，跑输纳斯达克100（+11.16%）但跑赢沪深300（+2.16%），Alpha为-7.03%。核心拖累来自黄金（-0.16%收益贡献），而固收、高股息等板块贡献为零，整体表现平庸，未捕捉到本周科技股反弹。
- 最大回撤-0.93%处于健康水平，但YTD收益+3.80%仍落后激进基准，需警惕机会成本。

## 2. 资产配置X光
- **穿透后核心重仓**：实物黄金（12.5%）与债基（9.4%）合计占比21.9%，构成防御核心。但本周黄金下跌-1.3%直接拖累组合-0.16%，暴露单一资产依赖风险。
- **风格漂移**：超配黄金19pp、低配消费15pp，与基准严重偏离。当前组合呈现“重避险、轻成长”特征，与本周科技、消费领涨的市场风格错配。
- **卫星仓位**：紫金矿业（-0.8%）、洛阳钼业（-2.0%）等有色股本周下跌，进一步拖累收益，未形成有效对冲。

## 3. 宏观因子敏感度
- **利率敏感度**：高股息+固收占比38%，若美联储或国内政策利率上行，组合将承压。当前市场对降息预期已充分定价，利率反弹风险上升。
- **大宗商品敏感度**：黄金+有色占比33%，与商品价格正相关。本周黄金回调已显风险，若美元走强或避险情绪降温，该敞口可能继续拖累。

## 4. 核心风险指标审计
- 组合波动率24.30%处于中等偏高区间，但最大回撤仅-0.93%，说明近期波动主要由黄金等少数资产驱动，整体风险可控。
- 夏普比率未提供，但YTD收益+3.80%对比24.30%波动率，风险调整后收益偏低。当前组合处于“低回撤、低收益”的防御状态，需警惕钝化。

## 5. 行业/板块热力图
- 本周市场热点：科技（AI算力、半导体）、消费板块领涨，纳斯达克100周涨幅超11%。冷门板块：黄金、有色、高股息等防御性资产回调。
- 持仓匹配度：组合严重低配科技（AI算力仅7.9%、半导体4.1%），超配黄金与固收，与市场热点完全背离，导致本周Alpha为负。

## 6. 潜在机会提示
- **AI算力/半导体ETF**：本周纳斯达克100暴涨，AI产业链（如英伟达、寒武纪）动能强劲。当前组合科技仓位仅11.8%，可考虑增配半导体ETF（如512480）或AI主题基金，捕捉结构性行情。
- **消费复苏主题**：消费板块低配15pp，但国内消费数据边际改善，可关注食品饮料ETF（如515170）作为卫星仓位。

## 7. 潜在风险预警
- **黄金回调风险**：黄金占比12.5%为单一最大敞口，若美元指数反弹或地缘风险缓和，金价可能进一步回调，直接冲击组合净值。
- **利率上行风险**：固收+高股息占比38%，若国内长端利率因经济复苏预期上行，债基及高股息资产将面临价格下跌。

## 8. 持仓优化建议
- **减仓**：实物黄金（Au9999），建议从12.5%降至8%，释放资金用于科技配置。
- **加仓**：AI算力/半导体方向，建议将释放的黄金仓位（约¥1,000）转入半导体ETF或AI主题基金。
- **持有**：固收类资产（其他债基）维持现状，作为组合稳定器；有色股（紫金矿业、洛阳钼业）暂持，等待大宗商品反弹信号。

## 9. 下周行动计划
- **周一开盘**：减持实物黄金仓位至8%，锁定部分利润。
- **周三前**：将释放资金分批买入半导体ETF（如512480），初始仓位不超过组合5%。
- **周五复盘**：检查科技仓位是否达到15%，若未达标，考虑追加AI算力基金。

## 10. 分析师信心指数
**6/10** —— 组合防御性过强，错失科技反弹，但风险可控。下周需主动调整结构，否则将继续跑输激进基准。

## 11. CIO 总结陈词

**本周 CIO 核心洞察：**

- 抱团警示：底层个股 实物黄金 (Au9999) 的穿透总暴露已达组合的 12.5%，分散投资效果正在失效。

- 行动触发点：当前 固收 暴露为 23%，尚未触及预警线；若下周 大宗商品价格 出现剧烈波动，建议关注组合回撤。

## 12. 投资策略评估与风险预警

### 策略评估与风险预警

- **躺平 vs 模拟策略**：两者收益、回撤、夏普比率完全一致（-0.21%收益，0.93%最大回撤，夏普-1.00）。**躺平没输，但也没赢**——当前持仓在极端生存考验下仅浮亏¥219，波动率12.36%尚可接受。**无需换仓**，但别指望躺平能跑赢现金（基准收益0%）。

- **赚钱性价比**：夏普比率-1.00，意味着你每承担1单位风险，换来的是负收益。**这组合不是来赚钱的，是来磨炼你心态的**——年化波动12.36%却只亏0.21%，说明它跌得少但涨得更少。

- **压力测试警示**：  
  - 2008年重现：浮亏¥1.54万（当前市值¥2.35万的65.39%）。  
  - 2022年重现：浮亏¥5,089（-21.63%）。  
  - **2015年杠杆牛市崩盘**：当年收益+5.58%，最大回撤47.34%。若复现该年跌幅，浮亏¥0（因2015年整体正收益）。**但注意**：2015年回撤47.34%是年内高点至低点，若你持仓在高位，浮亏可能超¥1.1万。**如果你现在不减仓，遇到2015年那样的杠杆牛市崩盘，你将面临约¥0的浮亏，这是否超出了你的心理防线？**（实际取决于入场时点，但历史数据提示：该策略在2015年整体未亏，但回撤幅度惊人。）

- **结论**：躺平策略在短期（1周）数据中表现平庸，但历史压力测试显示极端年份可能亏损超60%。**如果你不能承受¥1.5万以上的浮亏，建议减仓至50%以下**。否则，继续躺平等于赌市场不重现2008年。</script>

    // 1. 词典配置（core + pending，来自 glossary_manager）
    const GLOSSARY = {"ETF": "ETF是打包一篮子资产的交易所交易基金，像一盒精选巧克力让你一次尝遍多种口味。", "FOF": "FOF是投资于其他基金的基金，帮你一键买入一篮子基金组合。它就像基金世界的专业买手，替你精选并搭配多个基金构建投资菜单。", "战术调仓": "战术调仓是投资者根据短期市场预测调整持仓以增强回报或控制风险的行为，这就像船长根据实时风浪微调航向，而非固守原定航线。", "Alpha": "Alpha是投资组合超越基准回报的超额收益。它好比赛车中车手凭借技术而非快车取得的额外优势。", "CIO": "首席投资官是公司投资决策的最终负责人，如同船长在金融市场中为投资组合掌舵导航。", "GPU": "GPU是驱动人工智能和复杂图形任务的核心处理器。它就像金融市场的做市商，同时处理海量交易指令，确保高效执行。", "TOP": "TOP是追踪台湾股市表现的基准指数，如同美股投资者观察标普500来把握市场脉搏。", "压舱石": "压舱石是投资组合中用于抵御市场波动的稳健资产，它如同远洋货轮的压舱石，在风浪中维持船身稳定。", "因子敏感度": "因子敏感度衡量投资组合对特定风险因子的暴露程度，就像体检报告显示你对不同过敏原的反应强度。", "夏普": "夏普比率衡量每承担一单位风险所获得的超额回报。就像衡量一辆车的燃油效率，它告诉你每消耗一升油能跑多远。", "抱团": "抱团是投资者集中买入少数热门资产导致其价格脱离基本面的群体行为；这就像粉丝抢购演唱会门票，无关歌手实力而纯粹因为害怕错过。", "资产配置": "资产配置是决定投资组合中各类资产比例的过程，如同规划一场晚宴的菜单，你需要平衡营养、口味与风险，确保无论主菜是否合胃口，沙拉和甜点都能稳定整体体验。", "超额收益": "超额收益是投资组合回报超过基准回报的部分，如同赛车手在标准圈速上额外争取到的领先优势。", "AI": "AI是让机器模拟人类智能的技术，它像一位不知疲倦的分析师，能瞬间处理海量数据并给出洞察。", "灰犀牛": "灰犀牛指那些概率极高、冲击巨大的潜在危机，它就像远处尘土飞扬中一头缓缓冲来的犀牛，人们往往因它行动看似缓慢而忽视，直到被撞倒才后悔莫及。", "风格漂移": "风格漂移是基金经理偏离其宣称的投资策略，就像承诺只做川菜的厨师开始偷偷加入法餐元素。", "止盈": "止盈是设定一个目标价位并在达到时卖出以锁定利润的交易策略；这就像在派对高潮时离场，确保你带着美好回忆而非一片狼藉回家。", "CNH": "CNH是离岸市场交易的人民币，汇率由国际市场供需决定；它就像人民币的海外分身，价格更自由地随全球投资者情绪波动。", "QDII": "QDII是合格境内机构投资者，允许中国内地居民通过本地基金投资海外市场。这就像给你的资金一本国际护照，可以出境在全球范围内寻找增长机会。", "止损": "止损是当投资亏损达到预定幅度时及时卖出以避免更大损失的纪律性操作；如同汽车安全带，未必常用但能在意外时限制伤害保护本金。", "GRID": "GRID是一种基于价格区间自动低买高卖的交易策略；它就像在震荡市里设置一张渔网，价格波动时会自动捕捉其中的差价利润。", "黑天鹅": "黑天鹅指不可预测的罕见事件，能颠覆市场常规逻辑；它就像金融市场的突然地震，虽百年一遇，却足以重塑所有建筑规则。", "Beta": "Beta衡量一项资产相对于整体市场的波动性。它就像一只小船在股市大海中的摇摆幅度——如果市场海浪上涨1%，Beta为1.5的股票就会上下颠簸1.5%。", "RSI": "RSI，即相对强弱指标，是一种衡量资产近期价格变动速度和幅度的动量震荡指标，用于识别超买或超卖状态。它就像汽车的油量表——当读数超过70时表示市场可能“加满油”过热，低于30则意味着“油箱见底”可能反弹，但油量表本身不决定车能开多远，只提示当前状态是否极端。", "US10Y": "美债10Y收益率。全球资产定价之锚，反映市场对长期通胀与无风险利率的预期。", "DXY": "美元指数。衡量美元对一篮子货币的强度，其走强通常对新兴市场流动性构成压力。", "VIX": "波动率指数（恐慌指数）。衡量标普500期权蕴含的隐含波动率，数值高企反映避险情绪浓厚。", "YTD": "今年以来（Year to Date）。从年初至今的累计收益或指标，用于跨周期比较。", "回撤": "最大回撤（MDD）。资产净值从历史高点回落的百分比，是评估风险控制能力的关键指标。", "历史回撤": "净值从历史高点回落的百分比，衡量最大亏损幅度。", "累计收益率": "从期初至今的复合收益百分比，反映长期投资表现。", "阿尔法": "超额收益（Alpha）。独立于市场波动之外的获利能力，体现主动管理的选股溢价。", "贝塔": "系统性收益（Beta）。与大盘波动相关的收益部分，反映组合对市场整体风险的暴露程度。", "波动率": "收益率离散程度。量化资产价格波动的剧烈程度，是现代投资组合风险定价的核心。", "再平衡": "资产权重纠偏。通过减持超配资产、增持低配资产，强制使组合回归目标风险水平。", "基准": "业绩比较基准（Benchmark）。客观评价组合获利能力是否达标的参照系。", "夏普比率": "风险调整后的收益效率，高夏普即收益拿得相对安稳。", "最大回撤": "特定时间内从巅峰到谷底的最惨跌幅，定义痛苦阈值与风险底线。", "区间收益率": "选定区间内，扣除增投/赎回后的投资回报率。", "年化收益率": "将区间收益率按年化折算，便于跨周期比较。", "胜率": "盈利交易日占比，如 60% 表示 10 天中有 6 天赚钱。", "盈亏比": "平均盈利日收益 ÷ 平均亏损日收益，衡量盈亏不对称性。", "真实收益": "(期末市值 - 期初市值) - 净流入，排除增投/赎回后的纯投资回报。", "净流入": "期间买入总额 - 卖出总额，正数表示净投入资金。", "行业热度": "根据市场资金流向与行业轮动，量化各行业当前热度，用于辅助择时与行业配置。", "综合分": "综合评分，结合行业热度、历史表现等维度的量化得分，用于排序筛选。"};

    // 2. 词典渲染引擎 (防止标签嵌套)
    const sortedTerms = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);

    function walkAndReplace(node) {
        if (node.nodeType === 3) { // 文本节点
            let text = node.data;
            let hasChange = false;
            sortedTerms.forEach(term => {
                if (text.includes(term)) {
                    const regex = new RegExp(term, 'g');
                    text = text.replace(regex, `@@${term}@@`);
                    hasChange = true;
                }
            });
            if (hasChange) {
                const newSpan = document.createElement('span');
                newSpan.innerHTML = text.replace(/@@(.*?)@@/g, (match, p1) => {
                    const tip = GLOSSARY[p1];
                    return tip ? `<span class="glossary-term" data-tip="${tip.replace(/"/g, '&quot;')}">${p1}</span>` : p1;
                });
                node.parentNode.replaceChild(newSpan, node);
            }
        } else {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                if (node.childNodes[i].className !== 'glossary-term') {
                    walkAndReplace(node.childNodes[i]);
                }
            }
        }
    }

    // 3. 执行渲染
    const renderWithGlossary = (sourceId, targetId) => {
        const target = document.getElementById(targetId);
        target.innerHTML = marked.parse(document.getElementById(sourceId).innerHTML);
        walkAndReplace(target);
    };

    renderWithGlossary('xray-source', 'xray-target');
    renderWithGlossary('ai-source', 'ai-target');

        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); sendBtn.click(); } });
    })();

    // 5. 登录与数据脱敏
    const privateData = {"current_mv": "¥23,527.02", "total_return": "+4.13%", "weekly_return": "+0.17%", "ytd_pnl_value": "¥+887", "ytd_pnl_rate": "+3.80%", "goal_target": "¥50,000", "goal_current": "¥25,000"};
    const publicData = {"current_mv": "已隐藏", "total_return": "+4.13%", "weekly_return": "+0.17%", "ytd_pnl_value": "已隐藏", "ytd_pnl_rate": "+3.80%", "goal_target": "已隐藏", "goal_current": "已隐藏"};
    const PASSWORD_HASH = "608f4a69d48963560e8c0fcb2f6da1a51e87b117dcf1b3054038f7cbd8660def";

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function renderData(data, isPrivate) {
        document.getElementById('current_mv').textContent = data.current_mv;
        document.getElementById('total_return').textContent = data.total_return;

        document.getElementById('ytd_pnl_rate').textContent = data.ytd_pnl_rate;

        document.getElementById('goal_current').textContent = data.goal_current;
    }

    function showPrivateData() {
        document.getElementById('statusText').textContent = '🟢 完整模式';
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('loginModal').classList.remove('show');

    }

    function showPublicData() {
        document.getElementById('statusText').textContent = '⚪️ 公开模式';
        document.body.classList.add('public-mode');
        var xray = document.getElementById('xray-target');
        if (xray) xray.classList.add('mask-pierced-mv');
        renderData(publicData, false);
    }

    function handleStatusClick() {
        const isLoggedIn = localStorage.getItem('fundAgentLoggedIn') === 'true';
        if (isLoggedIn) {
            if(confirm('确定要退出登录吗？')) {
                localStorage.removeItem('fundAgentLoggedIn');
                showPublicData();
            }
        } else {
            document.getElementById('loginModal').style.display = 'flex';
            document.getElementById('loginModal').classList.add('show');
        }
    }

    async function login() {
        const password = document.getElementById('passwordInput').value;
        if (!password) {
            document.getElementById('loginError').textContent = '请输入密码';
            return;
        }
        const hash = await sha256(password);
        if (hash === PASSWORD_HASH) {
            localStorage.setItem('fundAgentLoggedIn', 'true');
            showPrivateData();
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').textContent = '';
        } else {
            document.getElementById('loginError').textContent = '密码错误';
            setTimeout(() => { document.getElementById('loginError').textContent = ''; }, 2000);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('fundAgentLoggedIn') === 'true') {
            showPrivateData();
        } else {
            showPublicData();
        }
    });

    // 4. 悬浮窗监听
    const tooltip = document.getElementById('tooltip');
    document.addEventListener('mousemove', e => {
        if (e.target.classList.contains('glossary-term')) {
            tooltip.innerText = e.target.getAttribute('data-tip');
            tooltip.style.display = 'block';
            let x = e.clientX + 10;
            if (x + 280 > window.innerWidth) x = e.clientX - 290;
            tooltip.style.left = x + 'px';
            tooltip.style.top = (e.clientY + 10) + 'px';
        } else {
            tooltip.style.display = 'none';
        }
    });
</script>
