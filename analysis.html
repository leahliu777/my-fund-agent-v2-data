        <script type="text/template" id="ai-source">## 1. 本周表现审计
- 本周收益-4.19%，显著跑输稳健基准（沪深300 -1.16%），但大幅跑赢激进基准（纳斯达克100 -5.43%）。

## 2. 资产配置X光
- **行业分布失衡**：组合严重偏向防御性资产（固收+高股息+黄金合计占比54.4%），对成长板块（科技、消费）配置严重不足。

- **风格显著漂移**：相对于基准，组合在“黄金”上超配15个百分点，在“消费”上低配11个百分点，风格与市场主流（如沪深300）存在明显偏离。

## 3. 宏观因子敏感度
- **利率敏感度高**：高股息与固收类资产合计占比39%，若市场利率上行，这部分资产估值将面临压力。
- **大宗商品敏感度高**：有色与黄金合计占比30%，组合表现与大宗商品价格（尤其是黄金、工业金属）高度正相关。
- **结论**：组合对利率和商品价格高度敏感，在当前宏观环境下（如通胀预期、利率政策变动）波动可能加剧。

## 5. 行业/板块热力图
- **市场热点**：AI算力、半导体等科技成长板块近期受关注度高。您的组合在“AI算力”和“半导体”上合计配置仅11.3%，显著低配。
- **市场冷点/防御板块**：高股息、黄金等防御板块是近期市场震荡中的避风港。您的组合在此严重超配，与市场避险情绪匹配，但牺牲了成长性。
- **匹配度**：持仓与市场短期避险情绪匹配，但与长期经济增长动力（科技、消费）严重脱节。

## 6. 潜在机会提示
- **科创/半导体ETF**：当前组合严重缺乏科技成长暴露。可关注跟踪科创50、半导体产业指数的ETF，以较低成本增加对科技创新主线的配置。
- **消费复苏主题基金**：组合在消费板块低配11个百分点。可关注聚焦必选消费或消费龙头股的基金，作为经济复苏预期的布局。

## 7. 潜在风险预警
- **单一标的风险**：“天山铝业”作为第四大重仓股，本周暴跌显示其个股风险极高，是组合中的“灰犀牛”，需立即审视其持仓逻辑。
- **风格极端化风险**：过度集中于防御性资产（黄金、固收），若市场风险偏好转向、成长股反弹，组合将大幅跑输。
- **利率上行风险**：近四成资产对利率敏感，若央行货币政策收紧或通胀超预期，组合将面临双重打击（债跌、商品也可能波动）。

## 12. 投资策略评估与风险预警

### 投资策略评估与风险预警

**一、核心结论：你的“策略”约等于没有策略**
你提供的“模拟策略”与“躺平策略”数据完全一致（总收益-3.80%，最大回撤3.80%等）。这只能说明两件事：要么你的模拟策略就是完全复制当前持仓，毫无操作；要么回测数据有误。无论是哪种，结论都一样：**你目前没有任何有效的主动管理，只是在被动承受市场波动。**

*   **极端生存考验**：当前3.80%的最大回撤（约浮亏849元）只是“微风”。但你的组合波动率显示，它完全暴露在市场系统性风险下。

用历史极端行情检验你的持仓，结果触目惊心：
*   **2008年级别熊市**：你的组合将暴跌约65%，浮亏近1.46万元，市值直接腰斩再腰斩。
*   **2022年级别调整**：浮亏也将超过4800元。
*   **关于2015年**：数据显示当年区间收益为正（+5.58%），但请注意，当年市场经历了**47.34%** 的巨幅回撤。你的组合在那种“暴涨暴跌”的极端波动中能否真正守住正收益，要打一个大大的问号。如果市场复现2015年那种从牛市顶峰崩盘的走势，以你组合目前的高波动特性，**实际亏损极有可能远超数据模拟**。

    const GLOSSARY = {"ETF": "ETF是打包一篮子资产的交易所交易基金，像一盒精选巧克力让你一次尝遍多种口味。", "FOF": "FOF是投资于其他基金的基金，帮你一键买入一篮子基金组合。它就像基金世界的专业买手，替你精选并搭配多个基金构建投资菜单。", "战术调仓": "战术调仓是投资者根据短期市场预测调整持仓以增强回报或控制风险的行为，这就像船长根据实时风浪微调航向，而非固守原定航线。", "Alpha": "Alpha是投资组合超越基准回报的超额收益。它好比赛车中车手凭借技术而非快车取得的额外优势。", "CIO": "首席投资官是公司投资决策的最终负责人，如同船长在金融市场中为投资组合掌舵导航。", "GPU": "GPU是驱动人工智能和复杂图形任务的核心处理器。它就像金融市场的做市商，同时处理海量交易指令，确保高效执行。", "TOP": "TOP是追踪台湾股市表现的基准指数，如同美股投资者观察标普500来把握市场脉搏。", "压舱石": "压舱石是投资组合中用于抵御市场波动的稳健资产，它如同远洋货轮的压舱石，在风浪中维持船身稳定。", "因子敏感度": "因子敏感度衡量投资组合对特定风险因子的暴露程度，就像体检报告显示你对不同过敏原的反应强度。", "夏普": "夏普比率衡量每承担一单位风险所获得的超额回报。就像衡量一辆车的燃油效率，它告诉你每消耗一升油能跑多远。", "抱团": "抱团是投资者集中买入少数热门资产导致其价格脱离基本面的群体行为；这就像粉丝抢购演唱会门票，无关歌手实力而纯粹因为害怕错过。", "资产配置": "资产配置是决定投资组合中各类资产比例的过程，如同规划一场晚宴的菜单，你需要平衡营养、口味与风险，确保无论主菜是否合胃口，沙拉和甜点都能稳定整体体验。", "超额收益": "超额收益是投资组合回报超过基准回报的部分，如同赛车手在标准圈速上额外争取到的领先优势。", "AI": "AI是让机器模拟人类智能的技术，它像一位不知疲倦的分析师，能瞬间处理海量数据并给出洞察。", "灰犀牛": "灰犀牛指那些概率极高、冲击巨大的潜在危机，它就像远处尘土飞扬中一头缓缓冲来的犀牛，人们往往因它行动看似缓慢而忽视，直到被撞倒才后悔莫及。", "风格漂移": "风格漂移是基金经理偏离其宣称的投资策略，就像承诺只做川菜的厨师开始偷偷加入法餐元素。", "止盈": "止盈是设定一个目标价位并在达到时卖出以锁定利润的交易策略；这就像在派对高潮时离场，确保你带着美好回忆而非一片狼藉回家。", "CNH": "CNH是离岸市场交易的人民币，汇率由国际市场供需决定；它就像人民币的海外分身，价格更自由地随全球投资者情绪波动。", "QDII": "QDII是合格境内机构投资者，允许中国内地居民通过本地基金投资海外市场。这就像给你的资金一本国际护照，可以出境在全球范围内寻找增长机会。", "止损": "止损是当投资亏损达到预定幅度时及时卖出以避免更大损失的纪律性操作；如同汽车安全带，未必常用但能在意外时限制伤害保护本金。", "GRID": "GRID是一种基于价格区间自动低买高卖的交易策略；它就像在震荡市里设置一张渔网，价格波动时会自动捕捉其中的差价利润。", "US10Y": "美债10Y收益率。全球资产定价之锚，反映市场对长期通胀与无风险利率的预期。", "DXY": "美元指数。衡量美元对一篮子货币的强度，其走强通常对新兴市场流动性构成压力。", "VIX": "波动率指数（恐慌指数）。衡量标普500期权蕴含的隐含波动率，数值高企反映避险情绪浓厚。", "YTD": "今年以来（Year to Date）。从年初至今的累计收益或指标，用于跨周期比较。", "回撤": "最大回撤（MDD）。资产净值从历史高点回落的百分比，是评估风险控制能力的关键指标。", "历史回撤": "净值从历史高点回落的百分比，衡量最大亏损幅度。", "累计收益率": "从期初至今的复合收益百分比，反映长期投资表现。", "阿尔法": "超额收益（Alpha）。独立于市场波动之外的获利能力，体现主动管理的选股溢价。", "贝塔": "系统性收益（Beta）。与大盘波动相关的收益部分，反映组合对市场整体风险的暴露程度。", "波动率": "收益率离散程度。量化资产价格波动的剧烈程度，是现代投资组合风险定价的核心。", "再平衡": "资产权重纠偏。通过减持超配资产、增持低配资产，强制使组合回归目标风险水平。", "基准": "业绩比较基准（Benchmark）。客观评价组合获利能力是否达标的参照系。", "夏普比率": "风险调整后的收益效率，高夏普即收益拿得相对安稳。", "最大回撤": "特定时间内从巅峰到谷底的最惨跌幅，定义痛苦阈值与风险底线。", "区间收益率": "选定区间内，扣除增投/赎回后的投资回报率。", "年化收益率": "将区间收益率按年化折算，便于跨周期比较。", "胜率": "盈利交易日占比，如 60% 表示 10 天中有 6 天赚钱。", "盈亏比": "平均盈利日收益 ÷ 平均亏损日收益，衡量盈亏不对称性。", "真实收益": "(期末市值 - 期初市值) - 净流入，排除增投/赎回后的纯投资回报。", "净流入": "期间买入总额 - 卖出总额，正数表示净投入资金。", "行业热度": "根据市场资金流向与行业轮动，量化各行业当前热度，用于辅助择时与行业配置。", "综合分": "综合评分，结合行业热度、历史表现等维度的量化得分，用于排序筛选。"};

    // 2. 词典渲染引擎 (防止标签嵌套)
    const sortedTerms = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);

    function walkAndReplace(node) {
        if (node.nodeType === 3) { // 文本节点
            let text = node.data;
            let hasChange = false;
            sortedTerms.forEach(term => {
                if (text.includes(term)) {
                    const regex = new RegExp(term, 'g');
                    text = text.replace(regex, `@@${term}@@`);
                    hasChange = true;
                }
            });
            if (hasChange) {
                const newSpan = document.createElement('span');
                newSpan.innerHTML = text.replace(/@@(.*?)@@/g, (match, p1) => {
                    const tip = GLOSSARY[p1];
                    return tip ? `<span class="glossary-term" data-tip="${tip.replace(/"/g, '&quot;')}">${p1}</span>` : p1;
                });
                node.parentNode.replaceChild(newSpan, node);
            }
        } else {
            for (let i = node.childNodes.length - 1; i >= 0; i--) {
                if (node.childNodes[i].className !== 'glossary-term') {
                    walkAndReplace(node.childNodes[i]);
                }
            }
        }
    }

    // 3. 执行渲染
    const renderWithGlossary = (sourceId, targetId) => {
        const target = document.getElementById(targetId);
        target.innerHTML = marked.parse(document.getElementById(sourceId).innerHTML);
        walkAndReplace(target);

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
