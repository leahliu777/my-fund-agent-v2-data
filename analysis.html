    <script type="text/template" id="ai-source">## 1. 本周表现审计

- **风格漂移**：黄金超配19pp，消费低配15pp，组合已显著偏离均衡基准，呈现“避险+商品”特征。

- **利率敏感度**：高股息+固收占比38%，若利率上行，债券价格下跌将直接拖累净值。当前利率环境偏宽松，但需警惕政策转向。

const GLOSSARY = {"ETF": "ETF是打包一篮子资产的交易所交易基金，像一盒精选巧克力让你一次尝遍多种口味。", "FOF": "FOF是投资于其他基金的基金，帮你一键买入一篮子基金组合。它就像基金世界的专业买手，替你精选并搭配多个基金构建投资菜单。", "战术调仓": "战术调仓是投资者根据短期市场预测调整持仓以增强回报或控制风险的行为，这就像船长根据实时风浪微调航向，而非固守原定航线。", "Alpha": "Alpha是投资组合超越基准回报的超额收益。它好比赛车中车手凭借技术而非快车取得的额外优势。", "CIO": "首席投资官是公司投资决策的最终负责人，如同船长在金融市场中为投资组合掌舵导航。", "GPU": "GPU是驱动人工智能和复杂图形任务的核心处理器。它就像金融市场的做市商，同时处理海量交易指令，确保高效执行。", "TOP": "TOP是追踪台湾股市表现的基准指数，如同美股投资者观察标普500来把握市场脉搏。", "压舱石": "压舱石是投资组合中用于抵御市场波动的稳健资产，它如同远洋货轮的压舱石，在风浪中维持船身稳定。", "因子敏感度": "因子敏感度衡量投资组合对特定风险因子的暴露程度，就像体检报告显示你对不同过敏原的反应强度。", "夏普": "夏普比率衡量每承担一单位风险所获得的超额回报。就像衡量一辆车的燃油效率，它告诉你每消耗一升油能跑多远。", "抱团": "抱团是投资者集中买入少数热门资产导致其价格脱离基本面的群体行为；这就像粉丝抢购演唱会门票，无关歌手实力而纯粹因为害怕错过。", "资产配置": "资产配置是决定投资组合中各类资产比例的过程，如同规划一场晚宴的菜单，你需要平衡营养、口味与风险，确保无论主菜是否合胃口，沙拉和甜点都能稳定整体体验。", "超额收益": "超额收益是投资组合回报超过基准回报的部分，如同赛车手在标准圈速上额外争取到的领先优势。", "AI": "AI是让机器模拟人类智能的技术，它像一位不知疲倦的分析师，能瞬间处理海量数据并给出洞察。", "灰犀牛": "灰犀牛指那些概率极高、冲击巨大的潜在危机，它就像远处尘土飞扬中一头缓缓冲来的犀牛，人们往往因它行动看似缓慢而忽视，直到被撞倒才后悔莫及。", "风格漂移": "风格漂移是基金经理偏离其宣称的投资策略，就像承诺只做川菜的厨师开始偷偷加入法餐元素。", "止盈": "止盈是设定一个目标价位并在达到时卖出以锁定利润的交易策略；这就像在派对高潮时离场，确保你带着美好回忆而非一片狼藉回家。", "CNH": "CNH是离岸市场交易的人民币，汇率由国际市场供需决定；它就像人民币的海外分身，价格更自由地随全球投资者情绪波动。", "QDII": "QDII是合格境内机构投资者，允许中国内地居民通过本地基金投资海外市场。这就像给你的资金一本国际护照，可以出境在全球范围内寻找增长机会。", "止损": "止损是当投资亏损达到预定幅度时及时卖出以避免更大损失的纪律性操作；如同汽车安全带，未必常用但能在意外时限制伤害保护本金。", "GRID": "GRID是一种基于价格区间自动低买高卖的交易策略；它就像在震荡市里设置一张渔网，价格波动时会自动捕捉其中的差价利润。", "黑天鹅": "黑天鹅指不可预测的罕见事件，能颠覆市场常规逻辑；它就像金融市场的突然地震，虽百年一遇，却足以重塑所有建筑规则。", "Beta": "Beta衡量一项资产相对于整体市场的波动性。它就像一只小船在股市大海中的摇摆幅度——如果市场海浪上涨1%，Beta为1.5的股票就会上下颠簸1.5%。", "RSI": "RSI，即相对强弱指标，是一种衡量资产近期价格变动速度和幅度的动量震荡指标，用于识别超买或超卖状态。它就像汽车的油量表——当读数超过70时表示市场可能“加满油”过热，低于30则意味着“油箱见底”可能反弹，但油量表本身不决定车能开多远，只提示当前状态是否极端。", "US10Y": "美债10Y收益率。全球资产定价之锚，反映市场对长期通胀与无风险利率的预期。", "DXY": "美元指数。衡量美元对一篮子货币的强度，其走强通常对新兴市场流动性构成压力。", "VIX": "波动率指数（恐慌指数）。衡量标普500期权蕴含的隐含波动率，数值高企反映避险情绪浓厚。", "YTD": "今年以来（Year to Date）。从年初至今的累计收益或指标，用于跨周期比较。", "回撤": "最大回撤（MDD）。资产净值从历史高点回落的百分比，是评估风险控制能力的关键指标。", "历史回撤": "净值从历史高点回落的百分比，衡量最大亏损幅度。", "累计收益率": "从期初至今的复合收益百分比，反映长期投资表现。", "阿尔法": "超额收益（Alpha）。独立于市场波动之外的获利能力，体现主动管理的选股溢价。", "贝塔": "系统性收益（Beta）。与大盘波动相关的收益部分，反映组合对市场整体风险的暴露程度。", "波动率": "收益率离散程度。量化资产价格波动的剧烈程度，是现代投资组合风险定价的核心。", "再平衡": "资产权重纠偏。通过减持超配资产、增持低配资产，强制使组合回归目标风险水平。", "基准": "业绩比较基准（Benchmark）。客观评价组合获利能力是否达标的参照系。", "夏普比率": "风险调整后的收益效率，高夏普即收益拿得相对安稳。", "最大回撤": "特定时间内从巅峰到谷底的最惨跌幅，定义痛苦阈值与风险底线。", "区间收益率": "选定区间内，扣除增投/赎回后的投资回报率。", "年化收益率": "将区间收益率按年化折算，便于跨周期比较。", "胜率": "盈利交易日占比，如 60% 表示 10 天中有 6 天赚钱。", "盈亏比": "平均盈利日收益 ÷ 平均亏损日收益，衡量盈亏不对称性。", "真实收益": "(期末市值 - 期初市值) - 净流入，排除增投/赎回后的纯投资回报。", "净流入": "期间买入总额 - 卖出总额，正数表示净投入资金。", "行业热度": "根据市场资金流向与行业轮动，量化各行业当前热度，用于辅助择时与行业配置。", "综合分": "综合评分，结合行业热度、历史表现等维度的量化得分，用于排序筛选。"};

// ── 板块分布 ──
const SECTORS = [{"label": "Dividend", "value": 7226.612858}, {"label": "Resource", "value": 6359.1363679999995}, {"label": "Pension", "value": 5999.896484}, {"label": "Tech", "value": 3008.008662}];
const SECTOR_COLORS = {"Dividend": "#0a0a0a", "Resource": "#2563eb", "Pension": "#059669", "Tech": "#b8b4ac"};
const totalMV = SECTORS.reduce((s,x) => s+x.value, 0);

// 列表
const sectorList = document.getElementById('sectorList');
SECTORS.sort((a,b) => b.value-a.value).forEach(s => {
  const pct = (s.value/totalMV*100).toFixed(1);
  const color = SECTOR_COLORS[s.label] || '#94a3b8';
  sectorList.innerHTML += `<div class="sector-item">
    <div class="sector-dot" style="background:${color}"></div>
    <div class="sector-name">${s.label}</div>
    <div class="sector-bar-wrap"><div class="sector-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    <div class="sector-pct">${pct}%</div>
  </div>`;
});

// 圆环图
document.addEventListener('DOMContentLoaded', () => {
  if (typeof Plotly !== 'undefined') {
    Plotly.newPlot('assetDonut', [{
      labels: SECTORS.map(s=>s.label),
      values: SECTORS.map(s=>s.value),
      type: 'pie', hole: 0.65,
      marker: { colors: SECTORS.map(s => SECTOR_COLORS[s.label]||'#94a3b8') },
      textinfo: 'none',
      hovertemplate: '%{label}: ¥%{value:,.0f}<extra></extra>'
    }], {
      paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
      font: { color: '#48453f', size: 11, family: 'SF Mono' },
      showlegend: false,
      margin: { t:10, b:10, l:10, r:10 }, height: 180
    }, { responsive:true, displayModeBar:false });
  }
});

// ── 基准对比：重写为移动端友好 ──
(function() {
  const ctx = window.REPORT_CONTEXT;
  const el = document.getElementById('bench-content');
  if (!el || !ctx) return;
  // 提取 bench 数据 — 直接从已有 HTML 里读 bench-section，不再用旧 HTML
  // 用 REPORT_CONTEXT 里没有 bench 数据，保留原始 HTML 但加 overflow 保护
  el.style.overflowX = 'auto';
})();

// ── Markdown 渲染 ──
function renderMd(srcId, tgtId) {
  const src = document.getElementById(srcId);
  const tgt = document.getElementById(tgtId);
  if (!src || !tgt) return;
  try {
    marked.setOptions({ breaks:true, gfm:true });
    tgt.innerHTML = marked.parse(src.textContent || '');
  } catch(e) {
    tgt.textContent = src.textContent || '';
  }
}

// xray 直接渲染
renderMd('xray-source', 'xray-target');

// AI 审计懒渲染
document.getElementById('aiDetails')?.addEventListener('toggle', function() {
  if (this.open) renderMd('ai-source', 'ai-target');
});

// ── chatbar ──
(function() {
  const input = document.getElementById('chat-input');
  const send  = document.getElementById('chat-send');
  const reply = document.getElementById('chat-reply');
  if (!send) return;
  async function ask() {
    const q = (input.value || '').trim();
    if (!q) return;
    send.disabled = true; send.textContent = '…';
    reply.style.display = 'block';
    reply.textContent = '思考中…';
    try {
      const r = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ question:q, context: window.REPORT_CONTEXT })
      });
      const d = await r.json();
      reply.textContent = d.answer || d.error || '无响应';
    } catch(e) { reply.textContent = '请求失败：'+e.message; }
    finally { send.disabled=false; send.textContent='发送'; input.value=''; }
  }
  send.addEventListener('click', ask);
  input.addEventListener('keydown', e => { if(e.key==='Enter') ask(); });
})();

// ── 词典高亮 ──
const sortedTerms = Object.keys(GLOSSARY).sort((a,b) => b.length-a.length);
function walkAndReplace(node) {
  if (node.nodeType === 3) {
    let text = node.data; let hasChange = false;
    sortedTerms.forEach(term => {
      if (text.includes(term)) {
        text = text.replace(new RegExp(term,'g'), `@@${term}@@`);
        hasChange = true;
      }
    });
    if (hasChange) {
      const span = document.createElement('span');
      span.innerHTML = text.replace(/@@(.*?)@@/g, (m,p1) => {
        const tip = GLOSSARY[p1];
        return tip ? `<span class="glossary-term" data-tip="${tip.replace(/"/g,'&quot;')}">${p1}</span>` : p1;
      });
      node.parentNode.replaceChild(span, node);
    }
  } else if (node.nodeType === 1 && !['SCRIPT','STYLE','SPAN'].includes(node.tagName)) {
    Array.from(node.childNodes).forEach(walkAndReplace);
  }
}

// ── tooltip ──
const tooltip = document.getElementById('tooltip');
document.addEventListener('mouseover', e => {
  const t = e.target.closest('.glossary-term');
  if (t && t.dataset.tip) {
    tooltip.textContent = t.dataset.tip;
    tooltip.style.display = 'block';
  }
});
document.addEventListener('mouseout', () => { tooltip.style.display='none'; });
document.addEventListener('touchstart', e => {
  const t = e.target.closest('.glossary-term');
  if (t && t.dataset.tip) {
    tooltip.textContent = t.dataset.tip;
    tooltip.style.display = 'block';
    const r = t.getBoundingClientRect();
    tooltip.style.top = (r.top + window.scrollY - tooltip.offsetHeight - 8) + 'px';
    tooltip.style.left = Math.min(r.left, window.innerWidth-tooltip.offsetWidth-8) + 'px';
    setTimeout(() => { tooltip.style.display='none'; }, 3000);
  }
});
</script>
